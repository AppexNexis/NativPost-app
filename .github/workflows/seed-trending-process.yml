# .github/workflows/seed-trending-process.yml
name: Process Trending Seed Runs

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger seed-trending process endpoint
        run: |
          curl -X GET \
            https://app.nativpost.com/api/cron/seed-trending/process \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail --silent --show-error