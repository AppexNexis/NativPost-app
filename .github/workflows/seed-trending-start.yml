# .github/workflows/seed-trending-start.yml
name: Start Trending Seed Ingest

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger seed-trending start endpoint
        run: |
          curl -X GET \
            "https://app.nativpost.com/api/cron/seed-trending/start?sources=instagram,tiktok&limit=15" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail --silent --show-error